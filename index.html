<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chongmin Edet — Links</title>
    <link rel="icon" type="image/jpeg" href="self_portrait_sketch.jpg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800;900&family=Permanent+Marker&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #0e0e0e;
        --yellow: #e8d44d;
        --yellow-dim: rgba(232, 212, 77, 0.15);
        --white: #f5f5f0;
        --muted: #9a9a8a;
        --card: #1a1a18;
        --border: #2a2a25;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        background-image: url("dead-robot.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: var(--white);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        overflow-x: hidden;
      }
      @supports (-webkit-touch-callout: none) {
        body {
          background-attachment: scroll;
        }
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background: rgba(14, 14, 14, 0.7);
      }
      .static-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        opacity: 0.03;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 255, 255, 0.03) 2px,
          rgba(255, 255, 255, 0.03) 4px
        );
      }
      .container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 420px;
        width: 100%;
      }
      .photo-frame {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        overflow: hidden;
        border: 3px solid var(--yellow);
        margin-bottom: 20px;
      }
      .photo-frame img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .name {
        font-family: "Permanent Marker", cursive;
        font-size: 1.8rem;
        color: var(--yellow);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 6px;
        text-align: center;
      }
      .tagline {
        font-family: "Space Mono", monospace;
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 30px;
        text-align: center;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 14px;
        width: 100%;
      }
      .link-btn {
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px 20px;
        text-decoration: none;
        color: var(--white);
        transition: all 0.3s ease;
      }
      .link-btn:hover {
        border-color: var(--yellow);
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(232, 212, 77, 0.15);
        text-decoration: none;
      }
      .link-btn .icon {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--yellow-dim);
        border-radius: 8px;
        flex-shrink: 0;
      }
      .link-btn .icon svg {
        width: 18px;
        height: 18px;
        fill: var(--yellow);
      }
      .link-btn .text {
        display: flex;
        flex-direction: column;
      }
      .link-btn .text .label {
        font-family: "Space Mono", monospace;
        font-size: 0.9rem;
        font-weight: 700;
        color: var(--white);
      }
      .link-btn .text .desc {
        font-size: 0.75rem;
        color: var(--muted);
        margin-top: 2px;
      }
      .link-btn.primary {
        background: var(--yellow);
        border-color: var(--yellow);
      }
      .link-btn.primary .icon {
        background: rgba(0, 0, 0, 0.15);
      }
      .link-btn.primary .icon svg {
        fill: #000;
      }
      .link-btn.primary .text .label {
        color: #000;
      }
      .link-btn.primary .text .desc {
        color: rgba(0, 0, 0, 0.6);
      }
      .divider {
        width: 100%;
        height: 1px;
        background: var(--border);
        margin: 10px 0;
      }
      .footer {
        margin-top: 40px;
        text-align: center;
      }
      .footer p {
        font-family: "Space Mono", monospace;
        font-size: 0.65rem;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>

      <div class="footer">
        <p>2026 — Chongmin Edet Akpan</p>
      </div>

    <script>
      // Animate links on load
      gsap.from(".photo-frame", {
        scale: 0.5,
        opacity: 0,
        duration: 0.8,
        ease: "back.out(1.7)",
      });

      gsap.from(".name", {
        y: 20,
        opacity: 0,
        duration: 0.6,
        delay: 0.2,
        ease: "power3.out",
      });

      gsap.from(".tagline", {
        y: 20,
        opacity: 0,
        duration: 0.6,
        delay: 0.3,
        ease: "power3.out",
      });

      anime({
        targets: ".link-btn",
        translateY: [30, 0],
        opacity: [0, 1],
        delay: anime.stagger(80, { start: 0.4 }),
        duration: 600,
        easing: "easeOutCubic",
      });

      gsap.from(".footer", {
        opacity: 0,
        duration: 1,
        delay: 1.2,
      });

      // Typed.js
      new Typed("#typed-tagline", {
        strings: [
          "Ethical Hacker • Penetration Tester",
          "Incident Responder • SOC Analyst",
          "Network Engineering • Network Architecture",
        ],
        typeSpeed: 40,
        backSpeed: 30,
        backDelay: 2000,
        loop: true,
        showCursor: true,
        cursorChar: "|",
      });
    </script>
